name: CI

on:
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: sqa
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Backend - testes (unidade/integracao)
        working-directory: api
        run: |
          chmod +x mvnw
          ./mvnw -B test

      - name: Frontend - dependencias
        working-directory: client
        run: npm ci

      - name: Frontend - testes (unidade/integracao)
        working-directory: client
        run: npm test

      - name: Sobe a API
        working-directory: api
        env:
          SPRING_DATASOURCE_URL: "jdbc:mysql://127.0.0.1:3306/sqa?allowPublicKeyRetrieval=true&useSSL=false"
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root
        run: ./mvnw -B spring-boot:run > api.log 2>&1 &

      - name: Sobe o client
        working-directory: client
        run: |
          npm run build
          npm start > client.log 2>&1 &

      - name: Aguarda API e client
        run: npx --yes wait-on -t 180000 http://localhost:8080/posts?limit=1 http://localhost:3000

      - name: Tests - dependencias e navegador
        working-directory: tests
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: E2E e API (Playwright)
        working-directory: tests
        run: npm test
